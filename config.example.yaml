listen: ":8080"

auth:
  jwt_secret: "change-me-use-strong-secret"

audit_log: "stdout"

routes:
  - path: "/portainer"
    upstream: "http://localhost:9000"
    policy:
      allow_roles: ["admin"]

  - path: "/n8n"
    upstream: "http://localhost:5678"
    policy:
      allow_roles: ["admin"]

  - path: "/demo"
    upstream: "http://httpbin.org"
    policy:
      allow_roles: ["admin"]

  - path: "/health"
    upstream: "http://localhost:9000"
    policy:
      public: true
