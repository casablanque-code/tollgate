<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>patchbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono:ital,wght@0,100..700;1,100..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0: #0a0a0b; --bg1: #111114; --bg2: #18181d; --bg3: #222228;
    --border: #2a2a32; --border2: #363640;
    --text0: #e8e8f0; --text1: #a0a0b8; --text2: #606070;
    --accent: #7c6af7; --accent2: #a597ff;
    --green: #3ecf8e;
    --mono: 'Berkeley Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg0); color: var(--text0); font-family: var(--mono); }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* titlebar */
  #titlebar { display: flex; align-items: center; gap: 12px; height: 44px; padding: 0 14px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: .12em; color: var(--accent2); flex-shrink: 0; }
  .logo span { color: var(--text2); font-weight: 400; }
  #top-search-wrap { flex: 1; max-width: 480px; position: relative; }
  #top-search { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px 6px 32px; font-family: var(--mono); font-size: 12px; color: var(--text0); outline: none; transition: border-color .15s; }
  #top-search:focus { border-color: var(--accent); }
  #top-search::placeholder { color: var(--text2); }
  #top-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text2); pointer-events: none; }
  #top-search-results { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; z-index: 200; display: none; box-shadow: 0 16px 40px rgba(0,0,0,.5); max-height: 420px; overflow-y: auto; }
  #top-search-results.open { display: block; }
  .tsr-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .tsr-item:last-child { border-bottom: none; }
  .tsr-item:hover { background: var(--bg3); }
  .tsr-answer { font-size: 12px; color: var(--text1); line-height: 1.6; margin-bottom: 6px; }
  .tsr-sources { display: flex; flex-wrap: wrap; gap: 4px; }
  .tsr-src { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg1); border: 1px solid var(--border); color: var(--text2); }
  .tsr-empty { padding: 16px; font-size: 12px; color: var(--text2); text-align: center; }
  .tsr-searching { padding: 14px 16px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }

  /* workspace */
  #workspace { display: flex; flex: 1; overflow: hidden; gap: 1px; background: var(--border); }

  /* sidebar */
  #sidebar { width: 220px; min-width: 140px; background: var(--bg1); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  #sidebar-header { padding: 10px 12px 8px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #file-tree { flex: 1; overflow-y: auto; padding: 4px 0; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
  .tree-folder { padding: 5px 12px 5px 8px; font-size: 11px; color: var(--text1); display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
  .tree-folder:hover { color: var(--text0); }
  .tree-folder .icon { font-size: 10px; color: var(--text2); width: 10px; }
  .tree-folder.open .icon { color: var(--accent); }
  .tree-children { padding-left: 10px; }
  .tree-file { padding: 3px 12px 3px 20px; font-size: 11px; color: var(--text2); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 5px; border-radius: 3px; margin: 1px 4px; transition: all .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-file:hover { background: var(--bg3); color: var(--text1); }
  .tree-file.active { background: var(--bg3); color: var(--accent2); }

  /* center */
  #center { flex: 1; background: var(--bg1); display: flex; flex-direction: column; overflow: hidden; }
  #doc-header { padding: 10px 20px 9px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-height: 40px; }
  #breadcrumb { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; flex: 1; overflow: hidden; }
  #breadcrumb span { color: var(--text1); white-space: nowrap; }
  #breadcrumb .sep { color: var(--border2); }
  #doc-tags { display: flex; gap: 4px; flex-shrink: 0; }
  .doc-tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border2); color: var(--text2); }
  #doc-body { flex: 1; overflow-y: auto; padding: 24px 28px 48px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text2); gap: 10px; }
  .empty-state .big { font-size: 28px; font-family: var(--serif); font-style: italic; color: var(--text1); }
  .empty-state .hint { font-size: 11px; }

  /* markdown */
  .md-content { max-width: 700px; line-height: 1.75; }
  .md-content h1 { font-family: var(--serif); font-style: italic; font-size: 26px; color: var(--text0); margin-bottom: 14px; font-weight: 400; }
  .md-content h2 { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent2); margin: 28px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .md-content h3 { font-size: 12px; font-weight: 700; color: var(--text1); margin: 18px 0 7px; }
  .md-content p { font-size: 13px; color: var(--text1); margin-bottom: 10px; }
  .md-content code { font-family: var(--mono); font-size: 11px; background: var(--bg2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; color: var(--green); }
  .md-content pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin: 10px 0; overflow-x: auto; }
  .md-content pre code { background: none; border: none; padding: 0; font-size: 12px; color: var(--text0); line-height: 1.6; }
  .md-content ul, .md-content ol { padding-left: 18px; margin-bottom: 10px; }
  .md-content li { font-size: 13px; color: var(--text1); margin-bottom: 3px; }
  .md-content blockquote { border-left: 2px solid var(--accent); padding-left: 12px; margin: 10px 0; color: var(--text2); font-style: italic; }
  .md-content strong { color: var(--text0); font-weight: 700; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
  .md-content th { background: var(--bg2); color: var(--text1); padding: 7px 10px; text-align: left; border: 1px solid var(--border); font-weight: 700; }
  .md-content td { padding: 6px 10px; border: 1px solid var(--border); color: var(--text1); }

  /* right panel */
  #right-panel { width: 300px; min-width: 220px; background: var(--bg1); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  #chat-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  #chat-header .title { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text2); }
  #scope-toggle { display: flex; gap: 2px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 2px; }
  .scope-btn { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 3px; border: none; cursor: pointer; color: var(--text2); background: transparent; transition: all .12s; }
  .scope-btn.active { background: var(--bg3); color: var(--accent2); }
  #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
  .msg { display: flex; flex-direction: column; gap: 3px; animation: msgIn .18s ease; }
  @keyframes msgIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .msg-role { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text2); }
  .msg-role.user { color: var(--accent); }
  .msg-body { font-size: 12px; line-height: 1.65; color: var(--text1); background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; }
  .msg-body.user { background: var(--bg3); border-color: var(--border2); color: var(--text0); }
  .msg-body code { font-family: var(--mono); font-size: 11px; color: var(--green); background: var(--bg1); padding: 1px 4px; border-radius: 2px; }
  .msg-body pre { background: var(--bg0); border: 1px solid var(--border); border-radius: 4px; padding: 7px 9px; margin: 5px 0; overflow-x: auto; }
  .msg-body pre code { background: none; padding: 0; color: var(--text0); font-size: 11px; }
  .sources-bar { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .source-chip { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; transition: all .12s; }
  .source-chip:hover { border-color: var(--accent); color: var(--accent2); }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 9px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8);} 50%{opacity:1;transform:scale(1);} }
  #chat-input-area { padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #chat-form { display: flex; gap: 5px; align-items: flex-end; }
  #chat-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 7px 9px; color: var(--text0); font-family: var(--mono); font-size: 12px; resize: none; outline: none; min-height: 34px; max-height: 90px; transition: border-color .15s; scrollbar-width: thin; }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--text2); }
  #send-btn { background: var(--accent); border: none; border-radius: 4px; width: 30px; height: 30px; cursor: pointer; color: #fff; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0; }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .resize-handle { width: 3px; background: var(--border); cursor: col-resize; flex-shrink: 0; transition: background .15s; }
  .resize-handle:hover { background: var(--accent); }

  /* health badge */
  #health-badge { font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s; flex-shrink: 0; user-select: none; }
  #health-badge:hover { border-color: var(--accent); color: var(--accent2); }
  #health-badge.ok { border-color: var(--green); color: var(--green); }
  #health-badge.err { border-color: #f87171; color: #f87171; }

  /* sync button */
  #sync-btn { font-size: 11px; font-family: var(--mono); background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 3px; padding: 1px 6px; cursor: pointer; transition: all .15s; }
  #sync-btn:hover { border-color: var(--accent); color: var(--accent2); }
  #sync-btn.syncing { opacity: .5; cursor: not-allowed; }

  /* source chip preview tooltip */
  .source-chip { position: relative; }
  .source-chip .chip-preview { display: none; position: absolute; bottom: calc(100% + 6px); left: 0; background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px; padding: 6px 9px; font-size: 10px; color: var(--text1); white-space: pre-wrap; max-width: 240px; z-index: 300; line-height: 1.5; }
  .source-chip:hover .chip-preview { display: block; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <div class="logo">patch<span>book</span></div>
    <div id="health-badge" onclick="checkHealth()" title="Click to refresh status">● health</div>
    <div id="top-search-wrap">
      <span id="top-search-icon">⌕</span>
      <input id="top-search" placeholder="search knowledge base..." autocomplete="off"/>
      <div id="top-search-results"></div>
    </div>
  </div>
  <div id="workspace">
    <div id="sidebar">
      <div id="sidebar-header">
        <span>files</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="file-count">—</span>
          <button id="sync-btn" onclick="doSync()" title="Re-index notes/">↻</button>
        </div>
      </div>
      <div id="file-tree"></div>
    </div>
    <div class="resize-handle" id="rh-left"></div>
    <div id="center">
      <div id="doc-header">
        <div id="breadcrumb"><span style="color:var(--text2)">~/kb</span></div>
        <div id="doc-tags"></div>
      </div>
      <div id="doc-body">
        <div class="empty-state">
          <div class="big">patchbook</div>
          <div class="hint">select a file or search above</div>
        </div>
      </div>
    </div>
    <div class="resize-handle" id="rh-right"></div>
    <div id="right-panel">
      <div id="chat-header">
        <div class="title">rag chat</div>
        <div id="scope-toggle">
          <button class="scope-btn active" id="btn-all" onclick="setScope('all')">all</button>
          <button class="scope-btn" id="btn-doc" onclick="setScope('doc')">this doc</button>
        </div>
      </div>
      <div id="chat-messages">
        <div class="msg">
          <div class="msg-role">system</div>
          <div class="msg-body">Ready. Ask anything from your knowledge base.</div>
        </div>
      </div>
      <div id="chat-input-area">
        <div id="chat-form">
          <textarea id="chat-input" placeholder="ask..." rows="1"></textarea>
          <button id="send-btn" onclick="sendQuery()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const API = 'http://localhost:9999'
let currentScope = 'all', currentDoc = null, searchTimer = null

async function loadFileTree() {
  try {
    const r = await fetch(`${API}/sources`)
    if (!r.ok) throw new Error()
    const data = await r.json()
    renderTree(data.sources || [])
  } catch {
    document.getElementById('file-tree').innerHTML =
      `<div style="padding:14px 12px;font-size:11px;color:var(--text2);line-height:1.8">API unavailable<br><span style="color:var(--accent);cursor:pointer" onclick="loadFileTree()">↻ retry</span></div>`
  }
}

function renderTree(files) {
  document.getElementById('file-count').textContent = files.length
  const tree = document.getElementById('file-tree')
  if (!files.length) {
    tree.innerHTML = `<div style="padding:14px 12px;font-size:11px;color:var(--text2);line-height:1.8">no files yet<br>add .md to notes/ → click ↻ sync</div>`
    return
  }
  const groups = {}
  files.forEach(f => {
    const g = (f.tags && f.tags[0]) || 'general'
    if (!groups[g]) groups[g] = []
    groups[g].push(f)
  })
  tree.innerHTML = ''
  Object.entries(groups).sort().forEach(([group, items]) => {
    const folder = document.createElement('div')
    folder.className = 'tree-folder open'
    folder.innerHTML = `<span class="icon">▾</span><span>${group}</span>`
    const children = document.createElement('div')
    children.className = 'tree-children'
    folder.onclick = () => {
      const open = folder.classList.toggle('open')
      children.style.display = open ? '' : 'none'
      folder.querySelector('.icon').textContent = open ? '▾' : '▸'
    }
    items.forEach(f => {
      const el = document.createElement('div')
      el.className = 'tree-file'
      el.dataset.source = f.source
      el.textContent = f.source.replace(/\.md$/, '')
      el.onclick = (e) => { e.stopPropagation(); openFile(f); }
      children.appendChild(el)
    })
    tree.appendChild(folder)
    tree.appendChild(children)
  })
}

async function openFile(file) {
  currentDoc = file
  document.querySelectorAll('.tree-file').forEach(el =>
    el.classList.toggle('active', el.dataset.source === file.source))
  
  const tags = (file.tags || []).join(' / ')
  document.getElementById('breadcrumb').innerHTML = `
    <span style="color:var(--text2)">~/kb</span>
    <span class="sep">›</span><span style="color:var(--text2)">${tags||'general'}</span>
    <span class="sep">›</span><span>${file.source}</span>`
  
  document.getElementById('doc-tags').innerHTML =
    (file.tags||[]).map(t=>`<div class="doc-tag">#${t}</div>`).join('')
    
  const body = document.getElementById('doc-body')
  body.innerHTML = `<div style="padding:20px 0;font-size:11px;color:var(--text2)">loading…</div>`
  
  try {
    const r = await fetch(`${API}/file?name=${encodeURIComponent(file.source)}`)
    const data = await r.json()
    const md = data.content.replace(/^---[\s\S]*?---\n?/, '')
    body.innerHTML = `<div class="md-content">${marked.parse(md)}</div>`
  } catch {
    body.innerHTML = `<div class="md-content"><p style="color:var(--text2);font-size:12px">Preview unavailable.</p></div>`
  }
}

// Поиск (Top Search) теперь тоже поддерживает стриминг или быструю выдачу
async function doTopSearch(q) {
    const res = document.getElementById('top-search-results')
    try {
        const response = await fetch(`${API}/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        res.innerHTML = '<div class="tsr-item"><div class="tsr-answer" id="top-res-text"></div><div class="tsr-sources" id="top-res-src"></div></div>';
        
        const textEl = document.getElementById('top-res-text');
        const srcEl = document.getElementById('top-res-src');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');
            
            for (const line of lines) {
                if (!line) continue;
                const data = JSON.parse(line);
                if (data.sources) {
                    srcEl.innerHTML = data.sources.map(s => `<div class="tsr-src">📄 ${s.Source}</div>`).join('');
                }
                if (data.token) {
                    textEl.innerHTML += data.token; // Здесь можно добавить fmtMsg, если нужно форматирование
                }
            }
        }
    } catch (e) {
        res.innerHTML = `<div class="tsr-empty">⚠ Error: ${e.message}</div>`;
    }
}

document.getElementById('top-search').addEventListener('input', e => {
  clearTimeout(searchTimer)
  const q = e.target.value.trim()
  const res = document.getElementById('top-search-results')
  if (!q) { res.classList.remove('open'); return }
  res.innerHTML = `<div class="tsr-searching"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>thinking…</span></div>`
  res.classList.add('open')
  searchTimer = setTimeout(() => doTopSearch(q), 420)
})

// Чат со стримингом
async function sendQuery() {
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;

    document.getElementById('send-btn').disabled = true;
    input.value = ''; input.style.height = 'auto';
    
    addMsg('user', q);
    const msgId = addThinking(); // Создаем пустое сообщение для стриминга

    try {
        const response = await fetch(`${API}/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                query: q,
                source_filter: (currentScope === 'doc' && currentDoc) ? currentDoc.source : undefined
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        const bodyEl = document.getElementById(msgId);

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
                if (!line) continue;
                const data = JSON.parse(line);
                
                if (data.sources) {
                    renderSources(msgId, data.sources);
                }
                if (data.token) {
                    fullText += data.token;
                    bodyEl.innerHTML = fmtMsg(fullText); // Обновляем текст на лету
                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                }
            }
        }
    } catch (e) {
        document.getElementById(msgId).innerHTML = `⚠ Error: ${e.message}`;
    } finally {
        document.getElementById('send-btn').disabled = false;
        input.focus();
    }
}

function addMsg(role, content) {
    const c = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.innerHTML = `
        <div class="msg-role ${role}">${role==='user'?'you':'assistant'}</div>
        <div class="msg-body ${role}">${escHtml(content)}</div>`;
    c.appendChild(msg);
    c.scrollTop = c.scrollHeight;
}

function addThinking() {
    const c = document.getElementById('chat-messages');
    const id = 'msg-' + Date.now();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.innerHTML = `
        <div class="msg-role assistant">assistant</div>
        <div class="msg-body assistant" id="${id}"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    c.appendChild(msg);
    c.scrollTop = c.scrollHeight;
    return id;
}

function renderSources(msgId, sources) {
    const msgEl = document.getElementById(msgId).parentElement;
    const bar = document.createElement('div');
    bar.className = 'sources-bar';
    sources.forEach(s => {
        const chip = document.createElement('div');
        chip.className = 'source-chip';
        chip.innerHTML = `📄 ${escHtml(s.Source)}${s.preview ? `<div class="chip-preview">${escHtml(s.preview)}</div>` : ''}`;
        chip.onclick = () => openFile({source: s.Source, tags: ["manual"]});
        bar.appendChild(chip);
    });
    msgEl.appendChild(bar);
}

function fmtMsg(t) {
    t = t.replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    t = t.replace(/`([^`]+)`/g,'<code>$1</code>')
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    t = t.replace(/\n/g,'<br>')
    return t
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

async function doSync() {
  const btn = document.getElementById('sync-btn')
  btn.classList.add('syncing')
  btn.textContent = '…'
  try {
    const r = await fetch(`${API}/sync`, { method: 'POST' })
    const d = await r.json()
    btn.textContent = `✓ ${d.chunks}c`
    setTimeout(() => { btn.textContent = '↻'; btn.classList.remove('syncing') }, 2000)
    loadFileTree()
    checkHealth()
  } catch(e) {
    btn.textContent = '✗'
    setTimeout(() => { btn.textContent = '↻'; btn.classList.remove('syncing') }, 2000)
  }
}

async function checkHealth() {
  const badge = document.getElementById('health-badge')
  try {
    const r = await fetch(`${API}/health`)
    const d = await r.json()
    const ok = d.llm?.reachable
    badge.className = ok ? 'ok' : 'err'
    badge.title = `docs: ${d.index?.documents} chunks | ${d.index?.files} files | ollama: ${ok ? 'ok' : 'unreachable'} | model: ${d.llm?.model}`
    badge.textContent = ok ? `● ${d.index?.documents}d` : `○ ollama?`
  } catch {
    badge.className = 'err'
    badge.textContent = '○ api?'
  }
}

// Resize и Event Listeners остаются прежними...
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuery() }
})
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,90)+'px'
})

function makeResizable(handle, panel, dir) {
  let sx, sw
  handle.addEventListener('mousedown', e => {
    sx=e.clientX; sw=panel.offsetWidth
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none'
    const mv = e => { const dw=dir==='left'?e.clientX-sx:sx-e.clientX; panel.style.width=Math.max(140,Math.min(480,sw+dw))+'px' }
    const up = () => { document.body.style.cursor=''; document.body.style.userSelect=''; document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up) }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up)
  })
}
makeResizable(document.getElementById('rh-left'), document.getElementById('sidebar'), 'left')
makeResizable(document.getElementById('rh-right'), document.getElementById('right-panel'), 'right')

loadFileTree()
checkHealth()
setInterval(checkHealth, 30000)
</script>
